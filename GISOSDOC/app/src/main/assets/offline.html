<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კავშირი არ არის</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --fg: #1e1e2e;
            --accent: #4CAF50;
            --muted: #6b7280;
            --card: #f7f7f9;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e2e;
                --fg: #f3f4f6;
                --accent: #66bb6a;
                --muted: #9ca3af;
                --card: #2a2a3e;
            }
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .icon {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .icon svg { width: 52px; height: 52px; stroke: var(--accent); }
        h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
        p { color: var(--muted); margin: 0 0 24px; max-width: 320px; line-height: 1.5; }
        button {
            appearance: none;
            -webkit-appearance: none;
            border: 0;
            background: var(--accent);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 999px;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 1l22 22"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <path d="M12 20h.01"/>
            </svg>
        </div>
        <h1>კავშირი არ არის</h1>
        <p>შეამოწმეთ Wi-Fi ან მობილური ინტერნეტი და სცადეთ თავიდან.</p>
        <button onclick="retry()">ხელახლა ცდა</button>
    </div>
    <script>
        // რეალური ჩატვირთვისთვის native app-ს ვაცნობებთ სპეციალური სქემით.
        // ამ URL-ს MainActivity-ი ჩაიჭერს shouldOverrideUrlLoading-ში.
        function retry() {
            window.location.href = 'app://retry';
        }
        // ავტომატურად ცდა, თუ ქსელი დაბრუნდა
        window.addEventListener('online', retry);
    </script>
</body>
</html>
